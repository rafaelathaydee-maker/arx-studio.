<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar conta | ARX Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --glass: rgba(255,255,255,0.55);
  --danger-bg: rgba(255, 74, 74, 0.12);
  --danger-border: rgba(255, 74, 74, 0.3);
  --danger-text: #a51d1d;
  --success-bg: rgba(46, 204, 113, 0.12);
  --success-border: rgba(46, 204, 113, 0.28);
  --success-text: #156a39;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle,#ffffff,#eaeaea);
  padding:20px;
}

.box{
  width:100%;
  max-width:460px;
  padding:32px;
  border-radius:28px;
  background:var(--glass);
  backdrop-filter:blur(20px);
  box-shadow:0 20px 60px rgba(0,0,0,0.12);
}

h1{
  font-size:28px;
  margin-bottom:8px;
}

.sub{
  opacity:0.68;
  margin-bottom:22px;
  line-height:1.5;
}

input, select{
  width:100%;
  padding:14px 16px;
  border:none;
  outline:none;
  border-radius:16px;
  background:rgba(255,255,255,0.72);
  margin-bottom:12px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.4);
}

button{
  width:100%;
  padding:14px 16px;
  border:none;
  border-radius:16px;
  background:#111;
  color:#fff;
  cursor:pointer;
  font-weight:600;
  margin-top:4px;
}

button:disabled{
  opacity:0.7;
  cursor:not-allowed;
}

.back{
  display:block;
  text-align:center;
  margin-top:14px;
  color:#111;
  text-decoration:none;
  opacity:0.75;
}

.message{
  display:none;
  margin-bottom:14px;
  padding:14px 16px;
  border-radius:16px;
  font-size:14px;
  line-height:1.5;
}

.message.error{
  display:block;
  background:var(--danger-bg);
  border:1px solid var(--danger-border);
  color:var(--danger-text);
}

.message.success{
  display:block;
  background:var(--success-bg);
  border:1px solid var(--success-border);
  color:var(--success-text);
}
</style>
</head>

<body>

<div class="box">
  <h1>Criar conta</h1>
  <p class="sub">Preencha seus dados para contratar seu plano e acessar sua área de acompanhamento.</p>

  <div id="message" class="message"></div>

  <input id="nome" placeholder="Seu nome">
  <input id="email" type="email" placeholder="Seu email">
  <input id="whatsapp" placeholder="Seu WhatsApp">
  <select id="plano">
    <option value="">Selecione um plano</option>
    <option value="Starter">Starter</option>
    <option value="Pro">Pro</option>
    <option value="Elite">Elite</option>
  </select>
  <input id="senha" type="password" placeholder="Crie uma senha">

  <button id="criarBtn" onclick="criarConta()">Criar conta</button>

  <a class="back" href="/">Voltar para página inicial</a>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const plano = params.get('plano');
if (plano) {
  document.getElementById('plano').value = plano;
}

function showMessage(text, type = 'error') {
  const box = document.getElementById('message');
  box.className = `message ${type}`;
  box.textContent = text;
}

function clearMessage() {
  const box = document.getElementById('message');
  box.className = 'message';
  box.textContent = '';
}

async function criarConta() {
  clearMessage();

  const btn = document.getElementById('criarBtn');
  btn.disabled = true;
  btn.textContent = 'Criando conta...';

  const nome = document.getElementById('nome').value.trim();
  const email = document.getElementById('email').value.trim();
  const whatsapp = document.getElementById('whatsapp').value.trim();
  const plano = document.getElementById('plano').value;
  const senha = document.getElementById('senha').value;

  if (!nome || !email || !whatsapp || !plano || !senha) {
    showMessage('Preencha todos os campos.');
    btn.disabled = false;
    btn.textContent = 'Criar conta';
    return;
  }

  try {
    const res = await fetch('/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nome, email, whatsapp, plano, senha })
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
      showMessage(data.error || 'Não foi possível criar sua conta agora.');
      btn.disabled = false;
      btn.textContent = 'Criar conta';
      return;
    }

    showMessage('Conta criada com sucesso. Redirecionando para o login...', 'success');

    setTimeout(() => {
      window.location.href = '/login';
    }, 1000);

  } catch (err) {
    showMessage('Erro de conexão. Tente novamente em instantes.');
    btn.disabled = false;
    btn.textContent = 'Criar conta';
  }
}
</script>

</body>
</html>
