<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar conta | ARX Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --glass: rgba(255,255,255,0.55);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle,#ffffff,#eaeaea);
  padding:20px;
}

.box{
  width:100%;
  max-width:440px;
  padding:32px;
  border-radius:28px;
  background:var(--glass);
  backdrop-filter:blur(20px);
  box-shadow:0 20px 60px rgba(0,0,0,0.12);
}

h1{
  font-size:28px;
  margin-bottom:8px;
}

.sub{
  opacity:0.68;
  margin-bottom:22px;
  line-height:1.5;
}

input, select{
  width:100%;
  padding:14px 16px;
  border:none;
  outline:none;
  border-radius:16px;
  background:rgba(255,255,255,0.72);
  margin-bottom:12px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.4);
}

button{
  width:100%;
  padding:14px 16px;
  border:none;
  border-radius:16px;
  background:#111;
  color:#fff;
  cursor:pointer;
  font-weight:600;
  margin-top:4px;
}

.back{
  display:block;
  text-align:center;
  margin-top:14px;
  color:#111;
  text-decoration:none;
  opacity:0.75;
}
</style>
</head>

<body>

<div class="box">
  <h1>Criar conta</h1>
  <p class="sub">Preencha seus dados para contratar seu plano e acessar sua área de acompanhamento.</p>

  <input id="nome" placeholder="Seu nome">
  <input id="email" type="email" placeholder="Seu email">
  <input id="whatsapp" placeholder="Seu WhatsApp">
  <select id="plano">
    <option value="">Selecione um plano</option>
    <option value="Starter">Starter</option>
    <option value="Pro">Pro</option>
    <option value="Elite">Elite</option>
  </select>
  <input id="senha" type="password" placeholder="Crie uma senha">

  <button onclick="criarConta()">Criar conta</button>

  <a class="back" href="/">Voltar para página inicial</a>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const plano = params.get('plano');

if(plano){
  document.getElementById('plano').value = plano;
}

async function criarConta(){
  const nome = document.getElementById('nome').value.trim();
  const email = document.getElementById('email').value.trim();
  const whatsapp = document.getElementById('whatsapp').value.trim();
  const plano = document.getElementById('plano').value;
  const senha = document.getElementById('senha').value;

  try{
    const res = await fetch('/register',{
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ nome, email, whatsapp, plano, senha })
    });

    const data = await res.json();

    if(data.error){
      alert(data.error);
      return;
    }

    alert('Conta criada com sucesso.');
    window.location.href = '/login.html';
  }catch(err){
    alert('Erro ao criar conta.');
  }
}
</script>

</body>
</html>
