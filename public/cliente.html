<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | ARX Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#0f0f12;
  --bg2:#17171d;
  --glass:rgba(255,255,255,0.08);
  --glass-strong:rgba(255,255,255,0.12);
  --stroke:rgba(255,255,255,0.1);
  --white:#f5f7fb;
  --muted:rgba(255,255,255,0.72);
  --green1:#25D366;
  --green2:#1fb85a;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:radial-gradient(circle at top,var(--bg2),var(--bg1));
  color:var(--white);
  min-height:100vh;
}

.sidebar{
  width:240px;
  height:100vh;
  position:fixed;
  left:0;
  top:0;
  padding:28px 18px;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(24px);
  border-right:1px solid var(--stroke);
}

.sidebar h2{
  font-size:28px;
  margin-bottom:28px;
}

.menu-item{
  padding:14px 16px;
  border-radius:16px;
  margin-bottom:10px;
  cursor:pointer;
  background:transparent;
  transition:0.25s;
  color:var(--muted);
}

.menu-item:hover,
.menu-item.active{
  background:var(--glass-strong);
  color:#fff;
}

.content{
  margin-left:240px;
  padding:34px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:18px;
  margin-bottom:24px;
  flex-wrap:wrap;
}

.header h1{
  font-size:34px;
}

.sub{
  color:var(--muted);
  margin-top:6px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:18px;
  margin-top:22px;
}

.card{
  background:var(--glass);
  border:1px solid var(--stroke);
  backdrop-filter:blur(24px);
  border-radius:24px;
  padding:22px;
  box-shadow:0 18px 50px rgba(0,0,0,0.25);
}

.card h3{
  font-size:16px;
  color:var(--muted);
  margin-bottom:12px;
}

.big{
  font-size:26px;
  font-weight:800;
}

.block{
  margin-top:20px;
}

.list{
  display:grid;
  gap:16px;
  margin-top:18px;
}

.client-card{
  background:var(--glass);
  border:1px solid var(--stroke);
  backdrop-filter:blur(24px);
  border-radius:24px;
  padding:22px;
  box-shadow:0 18px 50px rgba(0,0,0,0.22);
}

.client-card h3{
  font-size:22px;
  margin-bottom:10px;
}

.client-meta{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
  margin-top:14px;
  color:var(--muted);
}

.whatsapp-btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  margin-top:18px;
  padding:12px 18px;
  border-radius:18px;
  background:linear-gradient(135deg,var(--green1),var(--green2));
  color:#fff;
  text-decoration:none;
  font-weight:700;
  box-shadow:0 14px 30px rgba(37,211,102,0.25);
}

.whatsapp-icon{
  width:22px;
  height:22px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  background:rgba(255,255,255,0.16);
  font-size:13px;
  font-weight:800;
}

.logout-btn{
  padding:12px 18px;
  border:none;
  border-radius:18px;
  background:rgba(255,255,255,0.08);
  color:#fff;
  cursor:pointer;
  border:1px solid var(--stroke);
}

.notice{
  margin-top:18px;
  line-height:1.7;
  color:var(--muted);
}

.obs-box{
  margin-top:18px;
  padding:18px;
  border-radius:20px;
  background:rgba(255,255,255,0.10);
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter:blur(20px);
  color:var(--muted);
  line-height:1.7;
}

.tabs{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:20px;
}

.tab-btn{
  padding:12px 16px;
  border:none;
  border-radius:16px;
  background:rgba(255,255,255,0.08);
  color:#fff;
  cursor:pointer;
  border:1px solid var(--stroke);
}

.tab-btn.active{
  background:rgba(255,255,255,0.16);
}

.status-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:16px;
}

.status-btn{
  padding:10px 14px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  color:#fff;
  background:rgba(255,255,255,0.1);
  border:1px solid var(--stroke);
}

@media (max-width: 900px){
  .sidebar{
    position:static;
    width:100%;
    height:auto;
    border-right:none;
    border-bottom:1px solid var(--stroke);
  }

  .content{
    margin-left:0;
    padding:22px;
  }
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>ARX</h2>
  <div class="menu-item active" id="menuDashboard">Dashboard</div>
  <div class="menu-item" id="menuNovoPedido" style="display:none;">Novo pedido</div>
  <div class="menu-item" id="menuAdmin" style="display:none;">Painel admin</div>
  <div class="menu-item" id="menuSupport">Suporte</div>
  <div class="menu-item" id="menuLogout">Sair</div>
</div>

<div class="content" id="app"></div>

<script>
const app = document.getElementById('app');

const admin = localStorage.getItem('admin');
const user = JSON.parse(localStorage.getItem('user') || 'null');
const adminUser = JSON.parse(localStorage.getItem('adminUser') || 'null');

if (!admin && !user) {
  window.location.href = '/login';
}

if (admin) {
  document.getElementById('menuAdmin').style.display = 'block';
} else {
  document.getElementById('menuNovoPedido').style.display = 'block';
}

function setActive(menuId){
  document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
  const el = document.getElementById(menuId);
  if (el) el.classList.add('active');
}

function whatsappLink(number, text){
  const clean = String(number || '').replace(/\D/g, '');
  return `https://wa.me/55${clean}?text=${encodeURIComponent(text)}`;
}

async function refreshCurrentUser() {
  if (!user || !user._id) return user;
  try {
    const res = await fetch(`/clientes/${user._id}`);
    const data = await res.json();
    if (!res.ok) return user;
    localStorage.setItem('user', JSON.stringify(data));
    return data;
  } catch {
    return user;
  }
}

async function showDashboard(){
  setActive('menuDashboard');

  if (admin) {
    const a = adminUser || {
      nome: 'Rafael Athayde',
      email: 'rafael.athaydee@gmail.com',
      whatsapp: '11968304041',
      plano: 'Administrador'
    };

    const podePagar = !currentUser.pagamentoAprovado;

app.innerHTML = `
  <div class="header">
    <div>
      <h1>Bem-vindo, ${currentUser.nome}</h1>
      <div class="sub">Sua área já está ativa para acompanhamento.</div>
    </div>
    <button class="logout-btn" onclick="logout()">Sair</button>
  </div>

  <div class="cards">
    <div class="card">
      <h3>Plano contratado</h3>
      <div class="big">${currentUser.plano}</div>
    </div>

    <div class="card">
      <h3>Status atual</h3>
      <div class="big">${currentUser.status || 'Pedido novo'}</div>
    </div>

    <div class="card">
      <h3>Canal de contato</h3>
      <div class="big" style="font-size:18px;">WhatsApp direto</div>
    </div>
  </div>

  <div class="block card">
    <h3>Próximos passos</h3>
    <div class="notice">
      Seu pedido foi registrado com sucesso. Você pode entrar em contato diretamente
      para alinhar referências, objetivos e detalhes do projeto.
    </div>

    <div class="obs-box">
      <strong>Observação importante</strong><br><br>
      Ao enviar mensagem no WhatsApp, informe seu nome e o plano contratado para agilizar seu atendimento.
    </div>

    <a class="whatsapp-btn" target="_blank" href="${whatsappLink('11968304041', `Olá Rafael, meu nome é ${currentUser.nome} e contratei o plano ${currentUser.plano}.`) }">
      <span class="whatsapp-icon">W</span>
      Falar no WhatsApp
    </a>
  </div>

  ${podePagar ? `
    <div class="block card">
      <h3>Pagamento via Pix</h3>
      <div class="notice">
        Gere o pagamento para iniciar seu projeto imediatamente.
      </div>

      <button class="whatsapp-btn" onclick="gerarPix()">
        <span class="whatsapp-icon">W</span>
        Gerar Pix
      </button>

      <div id="pixArea" style="margin-top:20px;"></div>
    </div>
  ` : ''}
`;
    return;
  }

  const currentUser = await refreshCurrentUser();

  app.innerHTML = `
    <div class="header">
      <div>
        <h1>Bem-vindo, ${currentUser.nome}</h1>
        <div class="sub">Sua área já está ativa para acompanhamento.</div>
      </div>
      <button class="logout-btn" onclick="logout()">Sair</button>
    </div>

    <div class="cards">
      <div class="card">
        <h3>Plano contratado</h3>
        <div class="big">${currentUser.plano}</div>
      </div>

      <div class="card">
        <h3>Status atual</h3>
        <div class="big">${currentUser.status || 'Pedido novo'}</div>
      </div>

      <div class="card">
        <h3>Canal de contato</h3>
        <div class="big" style="font-size:18px;">WhatsApp direto</div>
      </div>
    </div>

    <div class="block card">
      <h3>Próximos passos</h3>
      <div class="block card">
  <h3>Pagamento via Pix</h3>

  <div class="notice">
    Gere o pagamento para iniciar seu projeto imediatamente.
  </div>

  <button class="whatsapp-btn" onclick="gerarPix()">
    Gerar Pix
  </button>

  <div id="pixArea" style="margin-top:20px;"></div>
</div>
      <div class="notice">
        Seu pedido foi registrado com sucesso. Você pode entrar em contato diretamente para alinhar referências, objetivos e detalhes do projeto.
      </div>

      <div class="obs-box">
        <strong>Observação importante</strong><br><br>
        Ao enviar mensagem no WhatsApp, informe seu nome e o plano contratado para agilizar seu atendimento.
      </div>

      <a class="whatsapp-btn" target="_blank" href="${whatsappLink('11968304041', `Olá Rafael, meu nome é ${currentUser.nome} e contratei o plano ${currentUser.plano}.`) }">
        <span class="whatsapp-icon">W</span>
        Falar no WhatsApp
      </a>
    </div>
  `;
}

function showNewOrder(){
  setActive('menuNovoPedido');

  const currentUser = JSON.parse(localStorage.getItem('user') || 'null');

  if (!currentUser) {
    app.innerHTML = `<div class="card">Usuário não encontrado.</div>`;
    return;
  }

  if (currentUser.status !== 'Entregue') {
    app.innerHTML = `
      <div class="header">
        <div>
          <h1>Novo pedido</h1>
          <div class="sub">Esta opção é liberada após a entrega do pedido atual.</div>
        </div>
        <button class="logout-btn" onclick="logout()">Sair</button>
      </div>

      <div class="card">
        <h3>Pedido atual em andamento</h3>
        <div class="notice">
          Você poderá solicitar um novo pedido quando o status do seu pedido atual estiver como Entregue.
        </div>
      </div>
    `;
    return;
  }

  app.innerHTML = `
    <div class="header">
      <div>
        <h1>Novo pedido</h1>
        <div class="sub">Escolha um novo plano para abrir outra cobrança.</div>
      </div>
      <button class="logout-btn" onclick="logout()">Sair</button>
    </div>

    <div class="card">
      <h3>Selecionar novo plano</h3>

      <div class="notice">
        Ao abrir um novo pedido, seu status volta para Pedido novo e um novo Pix poderá ser gerado.
      </div>

      <div class="obs-box">
        <strong>Observação importante</strong><br><br>
        Ao mandar mensagem no WhatsApp, informe seu nome e o plano escolhido para agilizar seu atendimento.
      </div>

      <div style="margin-top:18px;">
        <select id="novoPlano" style="width:100%;padding:14px;border-radius:16px;border:none;">
          <option value="Starter">Starter</option>
          <option value="Pro">Pro</option>
          <option value="Elite">Elite</option>
        </select>
      </div>

      <button class="whatsapp-btn" style="margin-top:18px;" onclick="criarNovoPedido()">
        <span class="whatsapp-icon">W</span>
        Abrir novo pedido
      </button>
    </div>
  `;
}

function renderAdminList(data, statusFiltro, activeTab) {
  const filtrados = data.filter(c => (c.status || 'Pedido novo') === statusFiltro);

  const cardsHtml = filtrados.map((c) => {
    let valor = 0;
    if(c.plano === 'Starter') valor = 97;
    if(c.plano === 'Pro') valor = 197;
    if(c.plano === 'Elite') valor = 397;

    const msg = `Olá ${c.nome}, aqui é Rafael da ARX Studio. Estou entrando em contato sobre seu pedido do plano ${c.plano}.`;

    return `
      <div class="client-card">
        <h3>${c.nome}</h3>

        <div class="client-meta">
          <div><strong>Email:</strong><br>${c.email}</div>
          <div><strong>WhatsApp:</strong><br>${c.whatsapp}</div>
          <div><strong>Plano:</strong><br>${c.plano}</div>
          <div><strong>Status:</strong><br>${c.status || 'Pedido novo'}</div>
        </div>

        <a class="whatsapp-btn" target="_blank" href="${whatsappLink(c.whatsapp, msg)}">
          <span class="whatsapp-icon">W</span>
          Chamar no WhatsApp
        </a>

        <div class="status-actions">
          <button class="status-btn" onclick="atualizarStatus('${c._id}', 'Pedido novo', '${activeTab}')">Pedido novo</button>
          <button class="status-btn" onclick="atualizarStatus('${c._id}', 'Recebido', '${activeTab}')">Recebido</button>
          <button class="status-btn" onclick="atualizarStatus('${c._id}', 'Entregue', '${activeTab}')">Entregue</button>
        </div>
      </div>
    `;
  }).join('');

  return cardsHtml || '<div class="card">Nenhum pedido nesta aba.</div>';
}

async function showAdmin(activeTab = 'Pedido novo'){
  setActive('menuAdmin');

  try{
    const res = await fetch('/clientes');
    const data = await res.json();

    const total = data.length;

    app.innerHTML = `
      <div class="header">
        <div>
          <h1>Painel admin</h1>
          <div class="sub">Controle de pedidos por status e contato direto.</div>
        </div>
        <button class="logout-btn" onclick="logout()">Sair</button>
      </div>

      <div class="cards">
        <div class="card">
          <h3>Total de clientes</h3>
          <div class="big">${total}</div>
        </div>

        <div class="card">
          <h3>Pedido novo</h3>
          <div class="big">${data.filter(c => (c.status || 'Pedido novo') === 'Pedido novo').length}</div>
        </div>

        <div class="card">
          <h3>Recebido</h3>
          <div class="big">${data.filter(c => c.status === 'Recebido').length}</div>
        </div>

        <div class="card">
          <h3>Entregue</h3>
          <div class="big">${data.filter(c => c.status === 'Entregue').length}</div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn ${activeTab === 'Pedido novo' ? 'active' : ''}" onclick="showAdmin('Pedido novo')">Pedido novo</button>
        <button class="tab-btn ${activeTab === 'Recebido' ? 'active' : ''}" onclick="showAdmin('Recebido')">Recebido</button>
        <button class="tab-btn ${activeTab === 'Entregue' ? 'active' : ''}" onclick="showAdmin('Entregue')">Entregues</button>
      </div>

      <div class="list">
        ${renderAdminList(data, activeTab, activeTab)}
      </div>
    `;
  } catch (err) {
    console.error(err);
    app.innerHTML = `<div class="card">Erro ao carregar clientes.</div>`;
  }
}

async function atualizarStatus(id, status, activeTab){
  try{
    const res = await fetch(`/clientes/${id}/status`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });

    const data = await res.json();

    if(!res.ok){
      alert(data.error || 'Erro ao atualizar status.');
      return;
    }

    showAdmin(activeTab);
  } catch(err){
    alert('Erro ao atualizar status.');
  }
}

function showSupport(){
  setActive('menuSupport');

  const isAdmin = !!admin;
  const nome = isAdmin ? 'Rafael Athayde' : user.nome;
  const plano = isAdmin ? 'Administrador' : user.plano;
  const msg = isAdmin
    ? 'Olá Rafael, estou na área administrativa da ARX.'
    : `Olá Rafael, meu nome é ${user.nome} e contratei o plano ${user.plano}.`;

  app.innerHTML = `
    <div class="header">
      <div>
        <h1>Suporte</h1>
        <div class="sub">Canal direto para alinhamento e dúvidas.</div>
      </div>
      <button class="logout-btn" onclick="logout()">Sair</button>
    </div>

    <div class="card">
      <h3>Contato direto</h3>
      <div class="notice">
        ${nome}, você pode entrar em contato a qualquer momento para tratar de ajustes, referências, andamento do projeto e próximos passos do plano ${plano}.
      </div>

      <div class="obs-box">
        <strong>Observação importante</strong><br><br>
        Informe seu nome e seu plano ao mandar mensagem para agilizar seu atendimento.
      </div>

      <a class="whatsapp-btn" target="_blank" href="${whatsappLink('11968304041', msg)}">
        <span class="whatsapp-icon">W</span>
        Falar no WhatsApp
      </a>
    </div>
  `;
}

function logout(){
  localStorage.removeItem('admin');
  localStorage.removeItem('user');
  localStorage.removeItem('adminUser');
  window.location.href = '/';
}

document.getElementById('menuDashboard').addEventListener('click', showDashboard);
document.getElementById('menuSupport').addEventListener('click', showSupport);
document.getElementById('menuLogout').addEventListener('click', logout);

if (admin) {
  document.getElementById('menuAdmin').addEventListener('click', () => showAdmin('Pedido novo'));
} else {
  document.getElementById('menuNovoPedido').addEventListener('click', showNewOrder);
}

showDashboard();
async function gerarPix(){
  const user = JSON.parse(localStorage.getItem('user'));

  const area = document.getElementById('pixArea');
  area.innerHTML = "Gerando pagamento...";

  try{
    const res = await fetch('/pix/create', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ userId: user._id })
    });

    const data = await res.json();

    if(!res.ok){
      area.innerHTML = "Erro ao gerar Pix";
      return;
    }

    area.innerHTML = `
      <div class="card">
        <h3>Escaneie o QR Code</h3>
        <img src="data:image/png;base64,${data.qrCodeBase64}" style="width:220px;margin-top:10px;"/>

        <h3 style="margin-top:20px;">Ou copie o código Pix</h3>
        <textarea style="width:100%;padding:10px;border-radius:10px;">${data.pixCopiaECola}</textarea>
      </div>
    `;
  }catch(err){
    area.innerHTML = "Erro ao conectar com servidor";
  }
}
async function gerarPix(){
  const currentUser = JSON.parse(localStorage.getItem('user') || 'null');
  const area = document.getElementById('pixArea');

  if (!currentUser || !currentUser._id) {
    if (area) area.innerHTML = 'Usuário inválido.';
    return;
  }

  if (area) area.innerHTML = 'Gerando pagamento...';

  try{
    const res = await fetch('/pix/create', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ userId: currentUser._id })
    });

    const data = await res.json();

    if(!res.ok){
      if (area) area.innerHTML = data.error || 'Erro ao gerar Pix.';
      return;
    }

    if (area) {
      area.innerHTML = `
        <div class="card">
          <h3>Escaneie o QR Code</h3>
          <img src="data:image/png;base64,${data.qrCodeBase64}" style="width:220px;margin-top:10px;border-radius:16px;" />

          <h3 style="margin-top:20px;">Ou copie o código Pix</h3>
          <textarea style="width:100%;padding:12px;border-radius:14px;margin-top:10px;">${data.pixCopiaECola}</textarea>
        </div>
      `;
    }
  }catch(err){
    if (area) area.innerHTML = 'Erro ao conectar com o servidor.';
  }
}
async function criarNovoPedido(){
  const currentUser = JSON.parse(localStorage.getItem('user') || 'null');
  const plano = document.getElementById('novoPlano')?.value;

  if (!currentUser || !currentUser._id || !plano) {
    alert('Não foi possível criar o novo pedido.');
    return;
  }

  try{
    const res = await fetch(`/clientes/${currentUser._id}/novo-pedido`, {
      method:'PATCH',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ plano })
    });

    const data = await res.json();

    if(!res.ok){
      alert(data.error || 'Erro ao criar novo pedido.');
      return;
    }

    localStorage.setItem('user', JSON.stringify(data.user));
    showDashboard();
  }catch(err){
    alert('Erro ao criar novo pedido.');
  }
}
</script>

</body>
</html>
