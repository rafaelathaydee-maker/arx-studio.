<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | ARX Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#0f0f12;
  --bg2:#17171d;
  --glass:rgba(255,255,255,0.08);
  --glass-strong:rgba(255,255,255,0.12);
  --stroke:rgba(255,255,255,0.1);
  --white:#f5f7fb;
  --muted:rgba(255,255,255,0.72);
  --green1:#25D366;
  --green2:#1fb85a;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:radial-gradient(circle at top,var(--bg2),var(--bg1));
  color:var(--white);
  min-height:100vh;
}

.sidebar{
  width:240px;
  height:100vh;
  position:fixed;
  left:0;
  top:0;
  padding:28px 18px;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(24px);
  border-right:1px solid var(--stroke);
}

.sidebar h2{
  font-size:28px;
  margin-bottom:28px;
}

.menu-item{
  padding:14px 16px;
  border-radius:16px;
  margin-bottom:10px;
  cursor:pointer;
  background:transparent;
  transition:0.25s;
  color:var(--muted);
}

.menu-item:hover,
.menu-item.active{
  background:var(--glass-strong);
  color:#fff;
}

.content{
  margin-left:240px;
  padding:34px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:18px;
  margin-bottom:24px;
  flex-wrap:wrap;
}

.header h1{
  font-size:34px;
}

.sub{
  color:var(--muted);
  margin-top:6px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:18px;
  margin-top:22px;
}

.card{
  background:var(--glass);
  border:1px solid var(--stroke);
  backdrop-filter:blur(24px);
  border-radius:24px;
  padding:22px;
  box-shadow:0 18px 50px rgba(0,0,0,0.25);
}

.card h3{
  font-size:16px;
  color:var(--muted);
  margin-bottom:12px;
}

.big{
  font-size:26px;
  font-weight:800;
}

.block{
  margin-top:20px;
}

.list{
  display:grid;
  gap:16px;
  margin-top:18px;
}

.client-card{
  background:var(--glass);
  border:1px solid var(--stroke);
  backdrop-filter:blur(24px);
  border-radius:24px;
  padding:22px;
  box-shadow:0 18px 50px rgba(0,0,0,0.22);
}

.client-card h3{
  font-size:22px;
  margin-bottom:10px;
}

.client-meta{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
  margin-top:14px;
  color:var(--muted);
}

.whatsapp-btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  margin-top:18px;
  padding:12px 18px;
  border-radius:18px;
  background:linear-gradient(135deg,var(--green1),var(--green2));
  color:#fff;
  text-decoration:none;
  font-weight:700;
  box-shadow:0 14px 30px rgba(37,211,102,0.25);
}

.whatsapp-icon{
  width:22px;
  height:22px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  background:rgba(255,255,255,0.16);
  font-size:13px;
  font-weight:800;
}

.logout-btn{
  padding:12px 18px;
  border:none;
  border-radius:18px;
  background:rgba(255,255,255,0.08);
  color:#fff;
  cursor:pointer;
  border:1px solid var(--stroke);
}

.notice{
  margin-top:18px;
  line-height:1.7;
  color:var(--muted);
}

@media (max-width: 900px){
  .sidebar{
    position:static;
    width:100%;
    height:auto;
    border-right:none;
    border-bottom:1px solid var(--stroke);
  }

  .content{
    margin-left:0;
    padding:22px;
  }
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>ARX</h2>
  <div class="menu-item active" id="menuDashboard">Dashboard</div>
  <div class="menu-item" id="menuAdmin" style="display:none;">Painel admin</div>
  <div class="menu-item" id="menuSupport">Suporte</div>
  <div class="menu-item" id="menuLogout">Sair</div>
</div>

<div class="content" id="app"></div>

<script>
const app = document.getElementById('app');

const admin = localStorage.getItem('admin');
const user = JSON.parse(localStorage.getItem('user') || 'null');
const adminUser = JSON.parse(localStorage.getItem('adminUser') || 'null');

if (!admin && !user) {
  window.location.href = '/login';
}

if (admin) {
  document.getElementById('menuAdmin').style.display = 'block';
}

function setActive(menuId){
  document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
  const el = document.getElementById(menuId);
  if (el) el.classList.add('active');
}

function whatsappLink(number, text){
  const clean = String(number || '').replace(/\D/g, '');
  return `https://wa.me/55${clean}?text=${encodeURIComponent(text)}`;
}

function showDashboard(){
  setActive('menuDashboard');

  if (admin) {
    const a = adminUser || {
      nome: 'Rafael Athayde',
      email: 'rafael.athaydee@gmail.com',
      whatsapp: '11968304041',
      plano: 'Administrador'
    };

    app.innerHTML = `
      <div class="header">
        <div>
          <h1>Bem-vindo, ${a.nome}</h1>
          <div class="sub">Seu acesso administrativo está ativo.</div>
        </div>
        <button class="logout-btn" onclick="logout()">Sair</button>
      </div>

      <div class="cards">
        <div class="card">
          <h3>Perfil</h3>
          <div class="big">Administrador</div>
        </div>

        <div class="card">
          <h3>Email</h3>
          <div class="big" style="font-size:18px;">${a.email}</div>
        </div>

        <div class="card">
          <h3>Contato</h3>
          <div class="big" style="font-size:18px;">${a.whatsapp}</div>
        </div>
      </div>

      <div class="block card">
        <h3>Resumo</h3>
        <div class="notice">
          Use o painel admin para visualizar clientes, planos contratados e entrar em contato por WhatsApp com cada pedido.
        </div>
      </div>
    `;
    return;
  }

  app.innerHTML = `
    <div class="header">
      <div>
        <h1>Bem-vindo, ${user.nome}</h1>
        <div class="sub">Seu pedido foi recebido e sua área já está ativa.</div>
      </div>
      <button class="logout-btn" onclick="logout()">Sair</button>
    </div>

    <div class="cards">
      <div class="card">
        <h3>Plano contratado</h3>
        <div class="big">${user.plano}</div>
      </div>

      <div class="card">
        <h3>Status</h3>
        <div class="big">Pedido recebido</div>
      </div>

      <div class="card">
        <h3>Canal de contato</h3>
        <div class="big" style="font-size:18px;">WhatsApp direto</div>
      </div>
    </div>

    <div class="block card">
      <h3>Próximos passos</h3>
      <div class="notice">
        Seu pedido foi registrado com sucesso. Você pode entrar em contato diretamente para alinhar detalhes do projeto, referências, objetivos e prazo.
      </div>

      <a class="whatsapp-btn" target="_blank" href="${whatsappLink('11968304041', `Olá Rafael, sou ${user.nome} e contratei o plano ${user.plano}.`) }">
        <span class="whatsapp-icon">W</span>
        Falar no WhatsApp
      </a>
    </div>
  `;
}

async function showAdmin(){
  setActive('menuAdmin');

  try{
    const res = await fetch('/clientes');
    const data = await res.json();

    let total = 0;

    const cardsHtml = data.map((c) => {
      let valor = 0;
      if(c.plano === 'Starter') valor = 197;
      if(c.plano === 'Pro') valor = 397;
      if(c.plano === 'Elite') valor = 697;
      total += valor;

      const msg = `Olá ${c.nome}, aqui é Rafael da ARX Studio. Estou entrando em contato sobre seu pedido do plano ${c.plano}.`;

      return `
        <div class="client-card">
          <h3>${c.nome}</h3>

          <div class="client-meta">
            <div><strong>Email:</strong><br>${c.email}</div>
            <div><strong>WhatsApp:</strong><br>${c.whatsapp}</div>
            <div><strong>Plano:</strong><br>${c.plano}</div>
            <div><strong>Valor:</strong><br>R$ ${valor}</div>
          </div>

          <a class="whatsapp-btn" target="_blank" href="${whatsappLink(c.whatsapp, msg)}">
            <span class="whatsapp-icon">W</span>
            Chamar no WhatsApp
          </a>
        </div>
      `;
    }).join('');

    app.innerHTML = `
      <div class="header">
        <div>
          <h1>Painel admin</h1>
          <div class="sub">Acompanhamento de clientes, planos e contato direto.</div>
        </div>
        <button class="logout-btn" onclick="logout()">Sair</button>
      </div>

      <div class="cards">
        <div class="card">
          <h3>Total de clientes</h3>
          <div class="big">${data.length}</div>
        </div>

        <div class="card">
          <h3>Faturamento estimado</h3>
          <div class="big">R$ ${total}</div>
        </div>

        <div class="card">
          <h3>Status</h3>
          <div class="big" style="font-size:18px;">Operação ativa</div>
        </div>
      </div>

      <div class="list">${cardsHtml || '<div class="card">Nenhum cliente cadastrado ainda.</div>'}</div>
    `;
  } catch (err) {
    console.error(err);
    app.innerHTML = `<div class="card">Erro ao carregar clientes.</div>`;
  }
}

function showSupport(){
  setActive('menuSupport');

  const isAdmin = !!admin;
  const nome = isAdmin ? 'Rafael Athayde' : user.nome;
  const plano = isAdmin ? 'Administrador' : user.plano;
  const msg = isAdmin
    ? 'Olá Rafael, estou na área administrativa da ARX.'
    : `Olá Rafael, sou ${user.nome} e contratei o plano ${user.plano}.`;

  app.innerHTML = `
    <div class="header">
      <div>
        <h1>Suporte</h1>
        <div class="sub">Canal direto para alinhamento e dúvidas.</div>
      </div>
      <button class="logout-btn" onclick="logout()">Sair</button>
    </div>

    <div class="card">
      <h3>Contato direto</h3>
      <div class="notice">
        ${nome}, você pode entrar em contato a qualquer momento para tratar de ajustes, referências, andamento do projeto e próximos passos do plano ${plano}.
      </div>

      <a class="whatsapp-btn" target="_blank" href="${whatsappLink('11968304041', msg)}">
        <span class="whatsapp-icon">W</span>
        Falar no WhatsApp
      </a>
    </div>
  `;
}

function logout(){
  localStorage.removeItem('admin');
  localStorage.removeItem('user');
  localStorage.removeItem('adminUser');
  window.location.href = '/';
}

document.getElementById('menuDashboard').addEventListener('click', showDashboard);
document.getElementById('menuSupport').addEventListener('click', showSupport);
document.getElementById('menuLogout').addEventListener('click', logout);

if (admin) {
  document.getElementById('menuAdmin').addEventListener('click', showAdmin);
}

showDashboard();
</script>

</body>
</html>
