<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | ARX Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --danger-bg: rgba(255, 74, 74, 0.12);
  --danger-border: rgba(255, 74, 74, 0.3);
  --danger-text: #a51d1d;
}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle,#ffffff,#eaeaea);
  font-family:'Inter',sans-serif;
  padding:20px;
}

.box{
  width:100%;
  max-width:400px;
  padding:30px;
  border-radius:25px;
  background:rgba(255,255,255,0.62);
  backdrop-filter:blur(20px);
  box-shadow:0 20px 60px rgba(0,0,0,0.15);
}

h1{
  margin-bottom:10px;
}

p{
  opacity:0.7;
  margin-bottom:18px;
}

input{
  width:100%;
  padding:14px;
  border:none;
  outline:none;
  border-radius:15px;
  margin-bottom:12px;
  background:rgba(255,255,255,0.82);
  box-sizing:border-box;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:15px;
  background:#000;
  color:#fff;
  cursor:pointer;
  font-weight:600;
}

button:disabled{
  opacity:0.7;
  cursor:not-allowed;
}

.back{
  margin-top:12px;
  display:block;
  text-align:center;
  text-decoration:none;
  color:#000;
  opacity:0.7;
}

.message{
  display:none;
  margin-bottom:14px;
  padding:14px 16px;
  border-radius:16px;
  font-size:14px;
  line-height:1.5;
}

.message.error{
  display:block;
  background:var(--danger-bg);
  border:1px solid var(--danger-border);
  color:var(--danger-text);
}
</style>
</head>

<body>

<div class="box">
  <h1>Entrar</h1>
  <p>Acesse sua conta para acompanhar seu pedido.</p>

  <div id="message" class="message"></div>

  <input id="email" type="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">

  <button id="entrarBtn">Entrar</button>

  <a href="/" class="back">Voltar para página inicial</a>
</div>

<script>
function showMessage(text) {
  const box = document.getElementById('message');
  box.className = 'message error';
  box.textContent = text;
}

function clearMessage() {
  const box = document.getElementById('message');
  box.className = 'message';
  box.textContent = '';
}

async function login() {
  clearMessage();

  const btn = document.getElementById('entrarBtn');
  btn.disabled = true;
  btn.textContent = 'Entrando...';

  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;

  if (!email || !senha) {
    showMessage('Preencha email e senha.');
    btn.disabled = false;
    btn.textContent = 'Entrar';
    return;
  }

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, senha })
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
      showMessage(data.error || 'Não foi possível entrar.');
      btn.disabled = false;
      btn.textContent = 'Entrar';
      return;
    }

    localStorage.removeItem('user');
    localStorage.removeItem('admin');
    localStorage.removeItem('adminUser');

    if (data.admin) {
      localStorage.setItem('admin', 'true');
      localStorage.setItem('adminUser', JSON.stringify(data.adminUser));
      window.location.href = '/dashboard';
      return;
    }

    if (data.user) {
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = '/dashboard';
      return;
    }

    showMessage('Resposta inválida do servidor.');
    btn.disabled = false;
    btn.textContent = 'Entrar';

  } catch (error) {
    console.error(error);
    showMessage('Erro de conexão. Tente novamente em instantes.');
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}

document.getElementById('entrarBtn').addEventListener('click', login);
</script>

</body>
</html>
